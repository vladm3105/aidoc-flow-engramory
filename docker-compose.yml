# Engramory — Phase 0 dev stack (all free / open-source).
# Cloud migration = swap these for managed services behind the same ports.
name: engramory

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-engramory}
      POSTGRES_USER: ${POSTGRES_USER:-engramory}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
    ports: ["5432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/migrations:/migrations:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-engramory}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    volumes: ["redisdata:/data"]

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-engramory}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-change_me}
    ports: ["9000:9000", "9001:9001"]
    volumes: ["miniodata:/data"]
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # One-shot: create the S3 bucket the app expects, then exit.
  minio-init:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${S3_ACCESS_KEY:-engramory} ${S3_SECRET_KEY:-change_me} &&
      mc mb --ignore-existing local/${S3_BUCKET:-engramory}
      "
    restart: "no"

  ollama:
    image: ollama/ollama
    ports: ["11434:11434"]
    volumes: ["ollamadata:/root/.ollama"]
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    depends_on:
      ollama:
        condition: service_healthy
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-change_me}
    ports: ["4000:4000"]
    volumes:
      - ./config/litellm.config.yaml:/app/config.yaml:ro

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-change_me}
    ports: ["7474:7474", "7687:7687"]
    volumes: ["neo4jdata:/data"]

  keycloak:
    # Pin a major version: the admin bootstrap env vars below are Keycloak 26+.
    image: quay.io/keycloak/keycloak:26.1
    command: start-dev
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-change_me}
    ports: ["8080:8080"]
    volumes: ["keycloakdata:/opt/keycloak/data"]

volumes:
  pgdata:
  redisdata:
  miniodata:
  ollamadata:
  neo4jdata:
  keycloakdata:
