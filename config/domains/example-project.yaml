# A project/domain config. Each consumer project (aidoc-flow, iplanic, ...)
# is one of these on the shared Engramory core. Trading is just an example.
domain:
  name: example-project
  display_name: "Example Project"
  version: 0.1.0

  terminology:
    entity_types: [document, decision, person, task]

  document_types:
    - type: note
      parser: markdown
      chunk_size: 800
      chunk_rationale: "Mid-size chunks balance recall and context for notes"

  memory:
    # Per-agent distilled memory is on by default; scope memories to this project.
    project_scope: example-project
    distillation:
      reflection: post_session     # distill episodes -> long-term after each session
      consolidation_frequency: 20  # compact long-term every N new memories

  models:
    chat: chat       # resolved by the LiteLLM gateway
    embed: embed
