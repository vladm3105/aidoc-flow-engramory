# LiteLLM gateway — single OpenAI-compatible endpoint for all models.
# Dev routes to local Ollama. In cloud, replace model entries with
# Vertex AI or Azure OpenAI deployments — application code does not change.
model_list:
  - model_name: chat
    litellm_params:
      model: ollama/llama3.1
      api_base: http://ollama:11434
  - model_name: embed
    litellm_params:
      model: ollama/nomic-embed-text
      api_base: http://ollama:11434

litellm_settings:
  drop_params: true

