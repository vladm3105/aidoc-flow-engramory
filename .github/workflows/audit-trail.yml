# audit-trail — consumer caller of aidoc-flow-ci's audit-trail-check.yml
# reusable per PLAN-002 §5.5 Wave 3 (product-code tier).

name: audit-trail

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  call:
    uses: vladm3105/aidoc-flow-ci/.github/workflows/audit-trail-check.yml@ci/v1.9.5
    with:
      runner_labels: '"ubuntu-latest"'
    permissions:
      contents: read
      pull-requests: read
