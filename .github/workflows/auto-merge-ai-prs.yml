# Caller for vladm3105/aidoc-flow-ci/.github/workflows/auto-merge-ai-prs.yml.
# Pinned at @ci/v1.5.1 per IPLAN-0030 P5 rollout — engramory adopts the
# server-side auto-merge enforcer alongside ai-review + composition wire-up
# in the same PR.
#
# The reusable is the server-side enforcer for AI-opened PRs (OPS-0062 deferred
# companion). It detects stuck-green PRs (label=ai:review-passed +
# mergeStateStatus=CLEAN + autoMergeRequest is null + updatedAt > 2 min) +
# re-arms `gh pr merge --auto --merge` under the reviewer App's token.
#
# Trigger architecture per IPLAN-0030 §2.2:
#   - workflow_run on ai-review + composition completion — chains off the
#     workflows that produce/update the ai:review-passed label + CLEAN state.
#     NOT check_suite (GHA anti-recursion blocks that trigger).
#   - workflow_dispatch for operator manual recovery on stuck-green PRs.
#
# DORMANCY: mirrors ai-review.yml + composition.yml — until the reviewer App
# is installed on this repo (F5 blast-radius prerequisite):
#   - workflow_run path is dormant (ai-review doesn't fire meaningfully
#     without the App).
#   - workflow_dispatch remains operator-invokable; gated by the reusable's
#     trust-gate (fail-closed) + auto_merge.repos allowlist. Engramory MUST
#     be added to the allowlist in a separate operations PR before this
#     enforcer's operator-dispatch path becomes useful.
name: auto-merge-ai-prs

on:
  workflow_run:
    workflows: ["ai-review", "composition"]
    types: [completed]

  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to attempt re-arm on (positive integer required)"
        type: string
        required: true

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  call:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    uses: vladm3105/aidoc-flow-ci/.github/workflows/auto-merge-ai-prs.yml@ci/v1.5.1
    with:
      pr_number: ${{ github.event.workflow_run.pull_requests[0].number || inputs.pr_number || '' }}
      # engramory uses ubuntu-latest — matches reusable's default.
    secrets: inherit  # pragma: allowlist secret
