# =============================================================================
# Section 2: Feature Definition
# =============================================================================
feature_definition:
  gherkin_tags:
    - "@brd:BRD.01.07.1a01"
    - "@prd:PRD.01.09.a100"
    - "@ears:EARS.01.03.a100"
  feature_name: "Engramory Memory & Knowledge Core"
  description: |
    As an operating AI agent,
    I want to retrieve scoped knowledge and distilled memory and record experience,
    So that I act with the right context and accumulate reusable lessons.
  background:
    steps:
      - "Given the Engramory system is in a ready state"
      - "And the distillation and consolidation workers are enabled"
      - 'And an authorized agent "agent-A" scoped to project "proj-1" / tenant "t-1"'

# =============================================================================
# Section 3: Scenario Structure
# =============================================================================
scenario_structure:
  scenarios:

    success:
      - id: "BDD.01.03.a100"
        name: "Scoped retrieval returns cited, provenance-bearing results within p95"
        tags: ["@scenario-type:success", "@p1-high", "@scenario-id:BDD.01.03.a100"]
        given: "agent-A has knowledge and distilled memory within its scope"
        when: "agent-A requests context for a task"
        then: "THE retrieval component SHALL return scoped sections and distilled memories, each with citations and provenance, WITHIN @threshold:PRD.01.perf.retrieval_p95"
        covers_ears: ["EARS.01.03.a100", "EARS.01.03.f030", "EARS.01.03.e020"]
        spec_trace: ["3 (Interfaces)", "5 (Behavior)"]
      - id: "BDD.01.03.b200"
        name: "Episode capture is acknowledged"
        tags: ["@scenario-type:success", "@p1-high", "@scenario-id:BDD.01.03.b200"]
        given: "agent-A has completed a task with a decision and an error"
        when: "agent-A submits an episode"
        then: "THE memory component SHALL persist it to agent-A's short-term scope and acknowledge WITHIN 1000 ms"
        covers_ears: ["EARS.01.03.b200"]
        spec_trace: ["3 (Interfaces)", "5 (Behavior)"]
      - id: "BDD.01.03.c300"
        name: "Approved SDD artifact creates a KB entry"
        tags: ["@scenario-type:success", "@p1-high", "@scenario-id:BDD.01.03.c300"]
        given: "an SDD artifact is approved with an evidence reference"
        when: "the artifact is submitted for ingestion"
        then: "THE knowledge component SHALL create its KB entry and traceability links WITHIN 60 s"
        covers_ears: ["EARS.01.03.c300"]
        spec_trace: ["3 (Interfaces)", "4 (Data Models)"]
      - id: "BDD.01.03.d400"
        name: "Consolidation runs at the configured cadence (observable)"
        tags: ["@scenario-type:success", "@p1-high", "@scenario-id:BDD.01.03.d400"]
        given: "long-term memory has accrued the cadence threshold of new entries"
        when: "the distillation worker runs"
        then: "THE distillation component SHALL execute a consolidation pass every @threshold:PRD.01.rate.consolidation_cadence AND emit an observable consolidation_run record"
        covers_ears: ["EARS.01.03.d400", "EARS.01.03.a040"]
        spec_trace: ["5 (Behavior)", "2 (Component Overview)"]
      - id: "BDD.01.03.d070"
        name: "Cross-project recall surfaces a lesson distilled in another project"
        tags: ["@scenario-type:success", "@p1-high", "@scenario-id:BDD.01.03.d070"]
        given: 'agent-A distilled a lesson while working in project "proj-A"'
        when: 'agent-A requests context while working in project "proj-B"'
        then: 'THE memory component SHALL surface the relevant lesson distilled in project "proj-A" within agent-A''s scope, WITHIN @threshold:PRD.01.perf.retrieval_p95'
        covers_ears: ["EARS.01.03.d070"]
        spec_trace: ["3 (Interfaces)", "5 (Behavior)"]
      - id: "BDD.01.03.e080"
        name: "Two agents diverge in private memory while sharing a team (space) namespace"
        tags: ["@scenario-type:success", "@p1-high", "@scenario-id:BDD.01.03.e080"]
        given: 'agents "agent-A" and "agent-B" share a team (space) namespace "team-1" in tenant "t-1"'
        when: "each agent records distinct experience and both read the shared namespace"
        then: "THE memory component SHALL keep each agent's per-agent memory distinct AND expose the shared team (space) namespace to both agents"
        covers_ears: ["EARS.01.03.e080"]
        spec_trace: ["3 (Interfaces)", "5 (Behavior)"]

    error:
      - id: "BDD.01.03.e500"
        name: "Cross-tenant request is denied and audited"
        tags: ["@scenario-type:error", "@p1-high", "@scenario-id:BDD.01.03.e500", "@security"]
        given: 'a memory record owned by tenant "t-2"'
        when: "agent-A (tenant t-1) requests that record"
        then: "THE access component SHALL deny the request, return no data, AND write an audit record WITHIN 200 ms"
        covers_ears: ["EARS.01.03.f600", "EARS.01.03.e020", "EARS.01.03.b050", "EARS.01.03.c060"]
        spec_trace: ["3 (Interfaces)", "5 (Behavior — error_handling)"]
      - id: "BDD.01.03.f600"
        name: "Governed-write without approval is rejected and audited"
        tags: ["@scenario-type:error", "@p1-high", "@scenario-id:BDD.01.03.f600", "@security"]
        given: "an SDD-artifact memory write with no approved-evidence reference"
        when: "the write is submitted"
        then: "THE knowledge component SHALL reject the write AND write an audit record WITHIN 200 ms"
        covers_ears: ["EARS.01.03.a700", "EARS.01.03.b050"]
        spec_trace: ["3 (Interfaces)", "5 (Behavior — error_handling)"]
      - id: "BDD.01.03.a700"
        name: "Low-confidence lesson is quarantined from default retrieval"
        tags: ["@scenario-type:error", "@p2-medium", "@scenario-id:BDD.01.03.a700"]
        given: "a distilled lesson whose confidence is below the floor"
        when: "the consolidation pass evaluates it"
        then: "THE distillation component SHALL mark the lesson advisory-only AND retain its provenance, AND default retrieval SHALL NOT return it"
        covers_ears: ["EARS.01.03.b800"]
        spec_trace: ["5 (Behavior)"]
      - id: "BDD.01.03.g010"
        name: "Secret material is excluded from stored memory"
        tags: ["@scenario-type:error", "@p1-high", "@scenario-id:BDD.01.03.g010", "@security"]
        given: "an episode submission whose content contains a credential-like string"
        when: "the write is screened and the reflection pass runs"
        then: "THE system SHALL exclude the secret content from any stored episode or memory AND write an audit record for the exclusion"
        covers_ears: ["EARS.01.04.c300"]
        spec_trace: ["5 (Behavior — validation_rules)"]

    recovery:
      - id: "BDD.01.03.b800"
        name: "Canonical store unavailable: fail closed with retryable error"
        tags: ["@scenario-type:recovery", "@p1-high", "@scenario-id:BDD.01.03.b800"]
        given: "the canonical store is unavailable"
        when: "agent-A requests context"
        then: "THE retrieval component SHALL fail closed (no stale or unscoped data) AND surface a retryable error WITHIN 500 ms; when the store recovers, retrieval SHALL resume"
        covers_ears: ["EARS.01.03.c900"]
        spec_trace: ["5 (Behavior — state_transitions)"]

    parameterized:
      - id: "BDD.01.03.c900"
        name: "Episode persistence is idempotent under repeated submission"
        tags: ["@scenario-type:parameterized", "@p2-medium", "@scenario-id:BDD.01.03.c900"]
        outline: true
        given: "an episode with identical content and scope"
        when: "it is submitted <submissions> times"
        then: "THE memory component SHALL store exactly <stored> copy"
        examples:
          headers: ["submissions", "stored"]
          rows:
            - ["1", "1"]
            - ["3", "1"]
            - ["10", "1"]
        covers_ears: ["EARS.01.03.e500"]
        spec_trace: ["4 (Data Models)", "5 (Behavior)"]

    optional:
      - id: "BDD.01.03.d010"
        name: "Managed accelerator used as cache only"
        tags: ["@scenario-type:optional", "@p2-medium", "@scenario-id:BDD.01.03.d010"]
        given: "a managed memory accelerator is configured"
        when: "agent-A requests context"
        then: "THE retrieval component SHALL use the accelerator as a cache only AND reconcile against the canonical store (canonical remains source of truth)"
        covers_ears: ["EARS.01.03.d010", "EARS.01.03.a040"]
        spec_trace: ["2 (Component Overview)"]

