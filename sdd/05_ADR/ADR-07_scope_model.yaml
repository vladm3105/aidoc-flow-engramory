  supersedes: { items: [] }

glossary:
  terms:
    - { term: "scope", definition: "How widely a memory is shared within a tenant: agent|project|domain|space." }
    - { term: "tenant_id", definition: "Hard multi-tenant isolation boundary; a column, not a scope value." }
    - { term: "space (scope)", definition: "Tenant-wide sharing; the top of the ladder (replaces 'shared')." }
