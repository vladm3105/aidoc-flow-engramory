  cross_links: { depends: [], discoverability: ["@discoverability: ADR-02 (ports)"] }
  health_score: { spec_ready: "[Pending]%", target_score: ">=90/100" }

related_decisions:
  dependencies:
    - { adr: "ADR-02", relationship: "Depends on", rationale: "Gateway sits behind LLMPort." }
  supersedes: { items: [] }

glossary:
