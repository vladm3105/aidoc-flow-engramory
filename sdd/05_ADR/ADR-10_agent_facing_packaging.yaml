glossary:
  terms:
    - { term: "face", definition: "A thin transport binding over AccessSurface (CLI, MCP gateway) that adds identity construction, argument parsing, and error mapping — never authorization, audit, or business logic." }
    - { term: "dev tier", definition: "Single-tenant local development: compose/ephemeral Postgres, no network exposure, profile=dev in the adapter factory." }
    - { term: "reference Skill", definition: "The single Claude SKILL.md carrying when/how judgment for the CLI; other vendors reach the same capability via their own instruction file pointing at the shared quickstart." }
