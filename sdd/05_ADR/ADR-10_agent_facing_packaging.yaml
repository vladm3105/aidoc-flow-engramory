# ADR-10 — Agent-facing packaging: layered thin faces over AccessSurface (CLI + reference Skill now; MCP gateway stays the production surface).
id: ADR-10
title: "Agent-facing packaging: CLI + reference Skill as the dev/CI face over AccessSurface; MCP gateway remains the authenticated production surface"

