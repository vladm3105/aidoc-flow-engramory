    - { criterion: "Cross-tenant read denied + audited", measurement: "BDD.01.03.e500" }
  bdd_scenario_refs: { scenarios: ["@bdd: BDD.01.03.f600", "@bdd: BDD.01.03.e500", "@bdd: BDD.01.03.a700"] }

