introduction:
  business_context: |
    BRD-01 ships a baseline distillation loop. This cycle improves the quality of what is kept and
    how lessons generalize — the core differentiator of "human-like" memory.
  purpose: "Define requirements for higher-quality distillation: confidence scoring, drift detection, smarter reflection/consolidation."
  document_scope:
    in_scope: ["Confidence scoring for distilled lessons", "Memory drift/staleness detection", "Smarter merge/generalize/quarantine", "Optional ML-assisted reflection"]
    out_of_scope: ["Baseline distillation (BRD-01)", "Cloud infra (BRD-02)"]

business_objectives:
  hypothesis:
    statement: "Better distillation measurably increases the rate at which recalled lessons improve outcomes."
  goals:
    - { statement: "Lesson confidence scoring drives retrieval inclusion", target: "Advisory vs confirmed separation measurable" }
    - { statement: "Stale/contradicted memories detected and retired", target: "Reduced wrong-lesson recall" }

