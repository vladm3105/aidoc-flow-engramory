# =============================================================================
# Section 10: Constraints and Assumptions
# =============================================================================
constraints_and_assumptions:
  constraints:
    items:
      - id: "BRD.01.10.a1c0"
        category: Budget
        description: "Development is self-hosted on free/OSS stack; $0 infra in dev."
        impact: "Cloud cost deferred to migration (BRD-02)."
      - id: "BRD.01.10.b2c1"
        category: Compatibility
        description: "Must replace ucx_kb without breaking Hermes KB skills or lifecycle gates."
        impact: "ucx_kb parity is a hard acceptance gate."
      - id: "BRD.01.10.c3c2"
        category: Portability
        description: "No hard dependency on a single cloud's managed-only services."
        impact: "All infra reached through ports/adapters."
  assumptions:
    items:
      - id: "BRD.01.10.d4a0"
        assumption: "All ecosystem agents speak MCP."
        validation_method: "Confirm Codex/Claude Code/Hermes/custom MCP support."
        impact_if_false: "Provide thin adapters for non-MCP agents."
      - id: "BRD.01.10.e5a1"
        assumption: "Distillation can be driven by an off-the-shelf engine over our Postgres."
        validation_method: "Pilot LangMem/Cipher/Mem0 over Postgres."
        impact_if_false: "Build consolidation logic natively on Postgres."

# =============================================================================
# Section 11: Acceptance Criteria and Success Validation
# =============================================================================
acceptance_criteria:
  launch_gates:
    must_have:
      - "All P1 functional requirements implemented and demonstrated"
      - "ucx_kb coverage rules satisfied; Hermes KB skills operate unchanged"
      - "Four agent types operate against the MCP surface"
      - "Distillation loop demonstrated end-to-end (episode → lesson → reuse)"
      - "Self-host → managed cloud store migration path demonstrated"
    should_have:
      - "Governed-write authority enforced for SDD-artifact writes"
      - "Provenance/audit export available"
  post_launch_validation:
    thirty_day_metrics:
      - ">=2 projects sharing the memory plane"
      - ">=1 distilled-lesson-changed-outcome case"
    ninety_day_decision_gate:
      continue: "Proceed to BRD-02 (cloud migration) if MVP stable and adopted"
      pivot: "If distillation quality is insufficient, revisit the engine choice"
      maintain: "If adopted but no new scope needed"
      shutdown: "If shared-memory hypothesis fails validation"

# =============================================================================
# Section 12: Business Risk Management
# =============================================================================
risk_management:
  risks:
    - id: "BRD.01.12.a1d0"
      description: "Distillation quality is poor — lessons are noise, not signal."
      likelihood: Medium
      impact: High
      mitigation: "Adopt a proven consolidation engine before hand-rolling; keep provenance to trace and retire bad lessons."
      owner: "Technical Lead"
    - id: "BRD.01.12.b2d1"
      description: "ucx_kb replacement misses a coverage rule or breaks a Hermes skill."
      likelihood: Medium
      impact: High
      mitigation: "Treat ucx_kb coverage rules as a conformance suite; migrate behind a parity gate."
      owner: "Framework owner"
    - id: "BRD.01.12.c3d2"
      description: "Two stores (knowledge vs memory) drift."
      likelihood: Medium
      impact: Medium
      mitigation: "One rule: documents → knowledge core; distilled experience → memory core; cross-link by IDs, never duplicate."
      owner: "Technical Lead"
    - id: "BRD.01.12.d4d3"
      description: "Cloud lock-in creeps in via managed-only services."
      likelihood: Low
      impact: Medium
      mitigation: "Only managed services that are adapters behind a port; canonical data stays in Postgres/object storage."
      owner: "Technical Lead"

