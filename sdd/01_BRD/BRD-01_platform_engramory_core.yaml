# =============================================================================
# Section 7: Functional Requirements
# =============================================================================
functional_requirements:
  priority_definitions:
    P1: "Must Have — essential for MVP launch"
    P2: "Should Have — important but workarounds exist for MVP"
    Future: "Next cycle"
  requirements:
    - id: "BRD.01.07.1a01"
      title: "Knowledge Base (L0)"
      capability: "System must enable agents to store and retrieve project documents, plans, notes, and memos with section-level retrieval and citations."
      priority: P1
      complexity:
        rating: "3/5"
        rationale: "Multi-format ingestion; semantic + graph retrieval; moderate."
      business_needs:
        - "Store documents and return precise sections with sources"
        - "Serve knowledge to any agent over a common interface"
      business_rules:
        - "Every returned answer must carry citations to its source sections"
      acceptance_criteria:
        items:
          - id: "BRD.01.07.1a02"
            criterion: "Section-level retrieval with citation"
            target: ">=95% of answers cite the correct source section"
    - id: "BRD.01.07.2b01"
      title: "Short-Term Memory (L1)"
      capability: "System must maintain the current project/session working state for an agent."
      priority: P1
      complexity:
        rating: "2/5"
        rationale: "Project-scoped working set; bounded."
      business_needs:
        - "Hold the live state of the current project (decisions, open threads, recent errors)"
        - "Scope state so projects never mix"
      business_rules:
        - "Short-term state is project-scoped and archived (distilled) at project end"
      acceptance_criteria:
        items:
          - id: "BRD.01.07.2b02"
            criterion: "Project isolation"
            target: "No cross-project leakage of short-term state"
    - id: "BRD.01.07.3c01"
      title: "Long-Term Distilled Memory (L2)"
      capability: "System must retain distilled semantic, episodic, and procedural memory across all projects."
      priority: P1
      complexity:
        rating: "4/5"
        rationale: "Three memory types; cross-project; consolidation is the hard part."
      business_needs:
        - "Retain facts (semantic), events (episodic), and skills (procedural)"
        - "Make memory retrievable across projects"
      business_rules:
        - "Each memory keeps its source text and provenance"
      acceptance_criteria:
        items:
          - id: "BRD.01.07.3c02"
            criterion: "Cross-project recall"
            target: "Relevant lessons retrievable across >=2 projects"
    - id: "BRD.01.07.4d01"
      title: "Per-Agent Memory Identity (L3)"
      capability: "System must give each agent its own accumulating memory plus access to a shared team namespace."
      priority: P1
      complexity:
        rating: "3/5"
        rationale: "Namespacing by agent/project/scope; shared vs private."
      business_needs:
        - "Each agent accumulates its own experience across projects"
        - "Agents share a common team memory where appropriate"
      business_rules:
        - "Memory is scoped by agent, project, and shared/team scope"
      acceptance_criteria:
        items:
          - id: "BRD.01.07.4d02"
            criterion: "Per-agent divergence + sharing"
            target: "Two agents accrue distinct memories while sharing a team namespace"
    - id: "BRD.01.07.5e01"
      title: "Distillation Loop"
      capability: "System must consolidate raw experience into reusable, dense lessons via reflection and periodic consolidation."
      priority: P1
      complexity:
        rating: "5/5"
        rationale: "Deciding what to keep and how to generalize is the core value and risk."
      business_needs:
        - "Promote worthwhile episodes into long-term memory after sessions"
        - "Compact long-term memory so retrieval stays relevant ('endless via compression')"
      business_rules:
        - "Superseded facts are end-dated, not deleted; corrections are traceable"
      acceptance_criteria:
        items:
          - id: "BRD.01.07.5e02"
            criterion: "Experience becomes reusable lessons"
            target: ">=1 demonstrable case where a distilled lesson changed an outcome"
    - id: "BRD.01.07.6f01"
      title: "Shared Agent Access Interface"
      capability: "System must let any agent — Claude Code, Codex, Hermes, custom — read and write knowledge and memory through one shared, standard interface without bespoke integration."
      priority: P1
      complexity:
        rating: "3/5"
        rationale: "One shared interface; multiple agent runtimes. (Protocol/tech named in ADR topics.)"
      business_needs:
        - "Single access surface usable by all agent types without bespoke integration"
      business_rules:
        - "All access is authorized and scoped by agent, project, and tenant; other tenants are denied at the boundary"
      acceptance_criteria:
        items:
          - id: "BRD.01.07.6f02"
            criterion: "Cross-agent interoperability"
            target: ">=4 agent types operate against the MCP surface"
    - id: "BRD.01.07.7a01"
      title: "ucx_kb Replacement"
      capability: "System must perform all ucx_kb knowledge-base duties so the framework can retire ucx_kb."
      priority: P1
      complexity:
        rating: "4/5"
        rationale: "SDD-artifact KB entries, coverage rules, traceability graph, governed ingestion/maintenance, Hermes skill parity (G1–G9)."
      business_needs:
        - "Represent SDD artifacts (BRD…IPLAN, decisions) as knowledge entries"
        - "Enforce KB coverage rules and cumulative-tag traceability"
        - "Provide Hermes-compatible retrieval-enrichment and governed-maintenance behavior"
      business_rules:
        - "Lifecycle gates remain source of truth; the KB augments decisions (advisory for SDD artifacts)"
      acceptance_criteria:
        items:
          - id: "BRD.01.07.7a02"
            criterion: "Drop-in parity"
            target: "100% ucx_kb coverage rules satisfied; Hermes KB skills operate unchanged"
    - id: "BRD.01.07.8b01"
      title: "Portability (Self-Host → Cloud)"
      capability: "System must keep its canonical store portable so it can migrate from self-hosted to GCP or Azure without re-architecture."
      priority: P1
      complexity:
        rating: "3/5"
        rationale: "Ports/adapters; canonical store + rebuildable projections."
      business_needs:
        - "Own the canonical store in an open format"
        - "Migrate by standard dump + adapter swap, regenerating embeddings/graph"
      business_rules:
        - "Embeddings and graph are rebuildable projections, never the source of truth"
      acceptance_criteria:
        items:
          - id: "BRD.01.07.8b02"
            criterion: "Migratable canonical store"
            target: "Demonstrated dump + restore + adapter swap path to a managed cloud relational store"
    - id: "BRD.01.07.9c01"
      title: "Governed-Write Authority"
      capability: "System must ensure memory writes for SDD artifacts occur only on approved evidence."
      priority: P2
      complexity:
        rating: "3/5"
        rationale: "Approval-gated writes; provenance."
      business_needs:
        - "Tie SDD-artifact memory updates to approved IPLAN evidence"
      business_rules:
        - "No SDD-artifact memory write without an approval reference"
      acceptance_criteria:
        items:
          - id: "BRD.01.07.9c02"
            criterion: "Evidence-gated writes"
            target: "SDD-artifact writes rejected without an approval reference"
    - id: "BRD.01.07.0d01"
      title: "Provenance & Audit"
      capability: "System must record provenance for every memory and make records human-auditable."
      priority: P2
      complexity:
        rating: "2/5"
        rationale: "Provenance metadata + read-only export."
      business_needs:
        - "Every memory records where it came from (source episode, project, agent, time)"
        - "Provide a human-readable audit view on demand"
      business_rules:
        - "Provenance is mandatory on every distilled memory"
      acceptance_criteria:
        items:
          - id: "BRD.01.07.0d02"
            criterion: "Traceable memory"
            target: "Any distilled memory can be traced to its source episodes"

