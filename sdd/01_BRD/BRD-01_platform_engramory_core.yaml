# =============================================================================
# Section 15: Glossary
# =============================================================================
glossary:
  terms:
    - term: Engramory
      definition: "The aidoc-flow ecosystem's shared memory & knowledge plane (this project)."
    - term: L0/L1/L2/L3
      definition: "Knowledge base / short-term / long-term distilled / per-agent memory layers."
    - term: Distillation
      definition: "Reflection + consolidation that turns raw experience into reusable, dense lessons."
    - term: ucx_kb
      definition: "The aidoc-flow-framework knowledge-base package (RAG + Graph) that Engramory replaces."
    - term: Port / Adapter
      definition: "A vendor-neutral interface and its per-environment implementation."
    - term: Canonical store
      definition: "PostgreSQL — the source of truth; embeddings and graph are rebuildable projections."

