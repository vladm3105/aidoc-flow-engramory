# =============================================================================
# Section 2: Executive Summary
# =============================================================================
executive_summary:
  overview: |
    Engramory is the aidoc-flow ecosystem's shared memory & knowledge plane. It
    gives every AI agent a knowledge base plus per-agent distilled memory that
    persists across projects, and it replaces the framework's ucx_kb. This MVP
    proves the shared per-agent memory plane and ucx_kb parity on a portable,
    self-hosted stack.
  target_users:
    _note: "Primary 'users' are the AI agents that operate the ecosystem; the framework and consumer projects are secondary consumers. Used for persona-to-capability traceability (business_analyst C2)."
    primary:
      - segment: "AI agents (Claude Code, Codex, Hermes, custom CLI/agents)"
        need: "Retain and retrieve knowledge, skills, and experience across projects and sessions through one shared interface."
        size: "All ecosystem agents"
        serves_capabilities: ["BRD.01.07.1a01", "BRD.01.07.2b01", "BRD.01.07.3c01", "BRD.01.07.4d01", "BRD.01.07.5e01", "BRD.01.07.6f01", "BRD.01.07.8b01"]
    secondary:
      - segment: "aidoc-flow framework / Hermes lifecycle"
        need: "Knowledge-base representation of SDD artifacts with governed ingestion/maintenance, replacing ucx_kb."
        serves_capabilities: ["BRD.01.07.7a01", "BRD.01.07.9c01"]
      - segment: "Consumer projects (aidoc-flow, AI Operations Intelligence, BeeLocal)"
        need: "A shared brain to build on; provenance and audit of agent knowledge."
        serves_capabilities: ["BRD.01.07.0d01"]

# =============================================================================
# Trust Topology (security_engineer C1–C3, capability altitude)
# =============================================================================
actors_and_trust:
  _note: "Trust boundaries, data classification, and abuse cases at capability altitude. Control selection is deferred to PRD/ADR."
  _scope_note: "Scope ladder: agent → project → domain → shared. The 'domain' level (a vertical grouping several projects) is additive on the foundation (nullable domain_id); its full configuration + domain-shared memory is delivered in BRD-04 (Domain & Project Configuration)."
  actor_classes:
    - class: "Authenticated agent (scoped)"
      may: "Read/write knowledge and memory within its agent/project/tenant scope."
    - class: "Framework / Hermes lifecycle"
      may: "Write SDD-artifact KB entries only on approved IPLAN evidence (governed)."
    - class: "Human reviewer / auditor"
      may: "Read provenance and audit views; approve governed writes."
    - class: "Other tenants / unauthenticated"
      may: "No access — denied at the scope boundary."
  data_classification:
    - artifact: "Knowledge-base documents (plans, notes, memos)"
      class: "Confidential business data"
    - artifact: "Distilled memory (semantic/episodic/procedural)"
      class: "Confidential business data + provenance"
    - artifact: "Tenant/agent identifiers & scopes"
      class: "Confidential"
    - artifact: "Secrets / credentials"
      class: "MUST NOT be stored in Engramory — excluded by policy"
  abuse_cases:
    - "A compromised or mis-scoped agent could read another agent's or tenant's memory (mitigated by mandatory agent/project/tenant scoping)."
    - "Prompt-injected content could write false 'lessons' into long-term memory (mitigated by governed writes + provenance so bad lessons are traceable and retired)."
    - "A bulk export could exfiltrate confidential knowledge (mitigated by authorization + audit of read/export)."
  compliance_context:
    - "Per-tenant data residency obligations apply where consumer projects are regulated (e.g., BeeLocal remittance) — cited here; specific controls deferred to PRD/ADR."

# =============================================================================
# Section 3: Introduction
# =============================================================================
introduction:
  business_context: |
    The aidoc-flow ecosystem (UCX control plane, iplan-runner execution plane,
    and multiple consumer projects) currently has fragmented, project-local
    knowledge and no shared memory of what its AI agents have learned. Two
    predecessor efforts (RAC, the Nexus v3 design) and the framework's `ucx_kb`
    each solved part of the problem. Engramory consolidates them into one
    memory & knowledge plane and adds the missing capability: per-agent,
    distilled memory that persists across projects.
  purpose: |
    This BRD defines business requirements for the Engramory Memory & Knowledge
    Core MVP — the smallest capability set that lets every agent in the
    ecosystem retain knowledge, skills, and experience across projects, and
    that replaces `ucx_kb` with no loss of framework capability.
  document_scope:
    in_scope:
      - "Shared knowledge base and per-agent memory consumed over MCP"
      - "Short-term and long-term (distilled) memory with a consolidation loop"
      - "Replacement of ucx_kb (KB duties G1–G9) with conformance"
      - "Portability: self-hosted for development, migratable to GCP or Azure"
      - "Architecture decision topics for the existing platform ADRs"
    out_of_scope:
      - "Cloud-managed deployment automation (deferred to BRD-02)"
      - "Advanced ML-based distillation / scoring (deferred to BRD-03)"
      - "Consumer-project domain configs (deferred to BRD-04)"
      - "Governed pay-memory / wallet audit (deferred to BRD-05)"
      - "Detailed user stories and personas (PRD owns these)"

# =============================================================================
# Section 4: Business Objectives
# =============================================================================
business_objectives:
  hypothesis:
    statement: "If agents are given a shared, portable, per-agent distilled memory plane consumed over MCP, they retain knowledge/skills/experience across projects and the ecosystem can retire ucx_kb without losing framework capability."
    validation_questions:
      - "Can every agent (Claude Code, Codex, Hermes, custom) read/write memory over MCP without bespoke integration?"
      - "Does the distillation loop turn repeated experience into reusable lessons that measurably improve task outcomes?"
      - "Can Engramory satisfy all ucx_kb coverage rules and Hermes KB skills as a drop-in replacement?"
  problem_statement:
    problem: "Agent knowledge and memory are fragmented across projects and tools; there is no per-agent experiential memory, and the framework's KB (ucx_kb) is KB-only with no distilled cross-project memory."
    impact: "Agents repeat mistakes, lose context between projects and sessions, and knowledge is locked to individual stacks — slowing delivery and risking vendor lock-in."
    mvp_solution: "A single memory & knowledge plane (L0 knowledge base + L1–L3 memory + distillation) exposed over MCP, with Postgres as the portable canonical store."
  goals:
    - id: "BRD.01.04.a1f0"
      statement: "Provide a shared knowledge + memory plane consumed by all ecosystem agents over MCP."
      baseline: "N/A — new capability"
      target: "All four agent types read/write KB + memory via MCP in the MVP."
    - id: "BRD.01.04.b2e1"
      statement: "Replace ucx_kb as the framework knowledge base."
      baseline: "ucx_kb (RAG + Graph), KB-only"
      target: "100% of ucx_kb KB coverage rules satisfied; Hermes KB skills operate unchanged."
    - id: "BRD.01.04.c3d2"
      statement: "Retain distilled per-agent memory across projects."
      baseline: "N/A — new capability"
      target: "Semantic/episodic/procedural memory retained and retrievable across >=2 projects."
    - id: "BRD.01.04.d4c3"
      statement: "Keep the platform portable from self-host to cloud."
      baseline: "N/A — new capability"
      target: "Canonical data migrates self-host → GCP or Azure via standard dump + adapter swap, no re-architecture."
  success_metrics:
    - id: "BRD.01.04.e5b4"
      objective: "Cross-agent adoption"
      metric: "Number of agent types using the MCP memory/KB surface"
      target: ">=4 (Claude Code, Codex, Hermes, custom)"
      period: "MVP acceptance"
    - id: "BRD.01.04.f6a5"
      objective: "ucx_kb parity"
      metric: "ucx_kb coverage rules satisfied"
      target: "100%"
      period: "MVP acceptance"
    - id: "BRD.01.04.0796"
      objective: "Memory usefulness"
      metric: "Tasks where a retrieved distilled lesson changed the outcome"
      target: ">=1 demonstrable case per pilot project"
      period: "90 days post-launch"
  expected_benefits:
    quantifiable:
      - "Cross-project context reuse: >=2 projects sharing one memory plane"
      - "ucx_kb retired: 1 system replaced, not maintained in parallel"
    qualitative:
      - "Agents accumulate reusable skills and avoid repeating known errors"
      - "No vendor lock-in — canonical store is portable Postgres"
      - "One brain serving the whole ecosystem"
  cost_benefit:
    development_costs:
      team: "Small team x first MVP cycle (self-hosted, free OSS stack)"
      infrastructure: "$0 dev (Docker on existing hardware)"
      third_party: "$0 dev (Ollama local models); cloud billed only on migration"
    total_mvp_investment: "[TBD]"
    roi_hypothesis: "Replaces ucx_kb and unifies RAC + Nexus while adding per-agent memory — one plane instead of three."

# =============================================================================
# Section 5: Project Scope
# =============================================================================
project_scope:
  scope_statement: |
    Deliver the minimum memory & knowledge plane: a knowledge base (L0),
    short-term (L1) and long-term distilled (L2) memory, per-agent identity
    (L3) with a distillation loop, all reachable over MCP, with ucx_kb's KB
    duties covered and Postgres as the portable canonical store.
  core_features:
    p1_must_have:
      - "Knowledge base with section-level retrieval and citations (L0)"
      - "Short-term, project-scoped working memory (L1)"
      - "Long-term distilled semantic / episodic / procedural memory (L2)"
      - "Per-agent memory identity plus a shared team namespace (L3)"
      - "Distillation loop: reflection + consolidation"
      - "MCP access surface for all agent types"
      - "ucx_kb replacement (KB entries, coverage rules, traceability graph, governed ingestion/maintenance, Hermes skill compatibility)"
      - "Portable canonical store with self-host → cloud migration path"
    p2_should_have:
      - "Governed-write authority model (gates are source of truth; memory augments)"
      - "Provenance and human-auditable memory records"
  out_of_scope:
    items:
      - "Cloud-managed deployment automation (BRD-02)"
      - "Advanced ML distillation and scoring (BRD-03)"
      - "Consumer-project domain configs (BRD-04)"
      - "Pay-memory / wallet audit (BRD-05)"
    rationale: "MVP proves the shared per-agent memory plane and ucx_kb replacement; scaling and integrations follow."
  workflow:
    diagram:
      type: sequenceDiagram
      content: |
        participant Agent
        participant Engramory
        participant Memory Store
        Agent->>Engramory: Retrieve relevant knowledge + memory (scoped)
        Engramory->>Memory Store: Search L0/L1/L2 by scope
        Memory Store-->>Engramory: Ranked knowledge + distilled lessons
        Engramory-->>Agent: Context for the task
        Agent->>Engramory: Record new episodes (decisions, errors, outcomes)
        Engramory->>Memory Store: Append episodes; later distill into long-term memory
    happy_path:
      - "Agent requests context for a task; Engramory returns scoped knowledge + distilled lessons."
      - "Agent performs the task using that focused context."
      - "Agent records new experience (decisions, errors, outcomes)."
      - "Engramory distills worthwhile experience into long-term memory."
      - "Consolidation keeps long-term memory dense so retrieval stays relevant."

