introduction:
  business_context: |
    The user's primary concern is migrating an agent's "brain" across platforms/engines/versions.
    BRD-01 keeps the canonical store portable; this cycle delivers explicit export/import and
    cross-engine migration tooling.
  purpose: "Define requirements for brain export/import, cross-engine migration, and automated re-embed/re-projection."
  document_scope:
    in_scope: ["Export/import of an agent's memory (open format)", "Cross-engine migration (e.g., swap MemoryPort engine)", "Automated re-embed + graph re-projection", "Migration verification"]
    out_of_scope: ["Cloud infra migration (BRD-02)", "Distillation quality (BRD-03)"]

business_objectives:
  hypothesis:
    statement: "An agent's brain can be exported, moved across engines/platforms/models, and verified intact."
  goals:
    - { statement: "Portable export/import of memory", target: "Open format; round-trip preserves content + provenance" }
    - { statement: "Cross-engine/model migration verified", target: "Re-embed + re-project reproduces retrievable memory" }

