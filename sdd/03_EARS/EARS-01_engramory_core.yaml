# =============================================================================
# Glossary
# =============================================================================
glossary:
  terms:
    - term: EARS
      definition: "Easy Approach to Requirements Syntax"
    - term: "fail closed"
      definition: "On failure, deny access rather than serve stale or unscoped data."
    - term: "advisory-only lesson"
      definition: "A distilled memory excluded from default retrieval pending confirmation."
    - term: "rebuildable projection"
      definition: "A derived store (embeddings, graph) regenerable from the canonical store."

