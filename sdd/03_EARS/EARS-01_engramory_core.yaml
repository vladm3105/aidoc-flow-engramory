# =============================================================================
# Section 2: Purpose and Context
# =============================================================================
purpose_and_context:
  purpose: |
    Convert PRD-01 product capabilities into formal, atomic, testable EARS
    requirements (WHEN/WHILE/IF/WHERE/THE-SHALL) with measurable constraints.
  scope: |
    Covers the MVP capabilities: scoped retrieval (PRD.01.09.a100), experience
    capture + distillation (PRD.01.09.b200), shared agent access (PRD.01.09.c300),
    ucx_kb replacement (PRD.01.09.d400), and the portable canonical store
    (PRD.01.09.e500), plus failure modes (PRD §13) and abuse cases (BRD trust topology).
  audience: |
    System architects, developers, QA engineers, security reviewers.

# =============================================================================
# Section 3: Requirements
# =============================================================================
requirements:

  event_driven:
    - id: "EARS.01.03.a100"
      name: "Scoped context retrieval"
      statement: |
        WHEN an authorized agent requests context for a task,
        THE retrieval component SHALL return knowledge-base sections and distilled
        memories within the agent's agent/project/tenant scope, each with provenance,
        WITHIN @threshold: PRD.01.perf.retrieval_p95 (p95 800 ms).
      traceability: "@brd: BRD.01.07.1a01 | @prd: PRD.01.09.a100"
    - id: "EARS.01.03.b200"
      name: "Episode capture"
      statement: |
        WHEN an authorized agent submits an episode (decision, error, or outcome),
        THE memory component SHALL persist it to the agent's short-term scope and
        acknowledge acceptance WITHIN 1000 ms (p95).
      traceability: "@brd: BRD.01.07.5e01 | @prd: PRD.01.09.b200"
    - id: "EARS.01.03.c300"
      name: "SDD-artifact KB ingestion"
      statement: |
        WHEN an SDD artifact is approved with evidence,
        THE knowledge component SHALL create or update its KB entry and traceability
        links WITHIN one ingestion cycle (<= 60 s).
      traceability: "@brd: BRD.01.07.7a01 | @prd: PRD.01.09.d400"
    - id: "EARS.01.03.e500"
      name: "Idempotent episode persistence"
      statement: |
        WHEN an episode identical in content and scope to a stored episode is submitted,
        THE memory component SHALL NOT store a duplicate (idempotent by content hash within
        the same project scope) and SHALL acknowledge the existing record.
      traceability: "@brd: BRD.01.07.2b01 | @prd: PRD.01.09.b200"
    - id: "EARS.01.03.d070"
      name: "Cross-project distilled recall (L2)"
      statement: |
        WHEN an authorized agent retrieves context in project B,
        THE memory component SHALL surface relevant lessons distilled by that agent in
        project A within the agent's scope, WITHIN @threshold: PRD.01.perf.retrieval_p95.
      traceability: "@brd: BRD.01.07.3c01 | @prd: PRD.01.09.f600"

  state_driven:
    - id: "EARS.01.03.d400"
      name: "Consolidation cadence"
      statement: |
        WHILE long-term memory accrues new entries,
        THE distillation component SHALL run a consolidation pass every
        @threshold: PRD.01.rate.consolidation_cadence (20 new memories),
        WITHIN 300 s of reaching that threshold.
      traceability: "@brd: BRD.01.07.5e01 | @prd: PRD.01.09.b200"

  unwanted_behavior:
    - id: "EARS.01.03.f600"
      name: "Out-of-scope access denied (cross-tenant abuse)"
      statement: |
        IF a request targets memory outside the caller's agent/project/tenant scope,
        THE access component SHALL deny the request, return no data, and write an
        audit record WITHIN 200 ms.
      traceability: "@brd: BRD.01.07.6f01 | @prd: PRD.01.09.c300"
    - id: "EARS.01.03.a700"
      name: "Governed-write rejection (false-lesson abuse)"
      statement: |
        IF an SDD-artifact memory write arrives without an approved-evidence reference,
        THE knowledge component SHALL reject the write and write an audit record
        WITHIN 200 ms.
      traceability: "@brd: BRD.01.07.9c01 | @prd: PRD.01.09.d400"
    - id: "EARS.01.03.b800"
      name: "Low-confidence lesson quarantine (distillation noise)"
      statement: |
        IF a distilled lesson's confidence is below the configured floor,
        THE distillation component SHALL mark the lesson advisory-only (excluded from
        default retrieval) and retain its provenance as part of the same consolidation pass
        that evaluates it.
      traceability: "@brd: BRD.01.07.5e01 | @prd: PRD.01.09.b200"
    - id: "EARS.01.03.c900"
      name: "Canonical-store unavailability fallback"
      statement: |
        IF the canonical store is unavailable,
        THE retrieval component SHALL fail closed (deny rather than serve stale or
        unscoped data) and surface a retryable error WITHIN 500 ms.
      traceability: "@brd: BRD.01.07.8b01 | @prd: PRD.01.09.e500"

  optional_feature:
    - id: "EARS.01.03.d010"
      name: "Managed accelerator (feature-gated)"
      statement: |
        WHERE a managed memory accelerator is configured,
        THE retrieval component SHALL use it as a cache only, never as the source of
        truth, and reconcile against the canonical store.
      traceability: "@brd: BRD.01.07.8b01 | @prd: PRD.01.09.e500"

  ubiquitous:
    - id: "EARS.01.03.e020"
      name: "Authorization on every call"
      statement: |
        THE access component SHALL authorize and scope every read and write by
        agent, project, and tenant, for all requests.
      traceability: "@brd: BRD.01.07.6f01 | @prd: PRD.01.09.c300"
    - id: "EARS.01.03.f030"
      name: "Provenance on every memory"
      statement: |
        THE memory component SHALL record provenance (source episodes, agent, project,
        timestamps) on every distilled memory, for all memory types.
      traceability: "@brd: BRD.01.07.0d01 | @prd: PRD.01.09.b200"
    - id: "EARS.01.03.a040"
      name: "Canonical store is source of truth"
      statement: |
        THE system SHALL treat the relational canonical store as the source of truth
        and SHALL keep embeddings and graph as rebuildable projections, for all data.
      traceability: "@brd: BRD.01.07.8b01 | @prd: PRD.01.09.e500"
    - id: "EARS.01.03.b050"
      name: "Audit of authorization decisions"
      statement: |
        THE access component SHALL write an audit record for every authentication and
        authorization decision (allow and deny), for all requests.
      traceability: "@brd: BRD.01.07.0d01 | @prd: PRD.01.09.c300"
    - id: "EARS.01.03.c060"
      name: "Wrong-scope return rate bound"
      statement: |
        THE access component SHALL keep the rate of wrong-scope returns below
        @threshold: PRD.01.risk.authz_scope_error (< 0.5%), for all authorized reads.
      traceability: "@brd: BRD.01.07.6f01 | @prd: PRD.01.09.c300"
    - id: "EARS.01.03.e080"
      name: "Per-agent memory identity with shared team namespace (L3)"
      statement: |
        THE memory component SHALL maintain a distinct per-agent memory namespace for each
        agent while exposing a shared team (space-scoped) namespace, so that two agents
        diverge in private memory while sharing the team namespace, for all agents.
      traceability: "@brd: BRD.01.07.4d01 | @prd: PRD.01.09.a700"

# =============================================================================
# Section 4: Quality Attributes
# =============================================================================
quality_attributes:
  performance:
    - id: "EARS.01.04.a100"
      statement: "THE retrieval component SHALL complete scoped retrieval"
      metric: "Latency"
      target: "p95 < 800 ms (@threshold: PRD.01.perf.retrieval_p95); p50 < 300 ms; p99 < 1500 ms"
      priority: P1
      measurement: "Load test"
  security:
    - id: "EARS.01.04.b200"
      statement: "THE access component SHALL enforce per-call scope authorization"
      control: "Authorization (agent/project/tenant scoping)"
      compliance: "Tenant isolation; per-tenant residency"
      priority: P1
    - id: "EARS.01.04.c300"
      statement: "THE system SHALL exclude secrets/credentials from stored memory"
      control: "Data classification (secrets excluded by policy)"
      compliance: "Secrets handled by SecretsPort only"
      priority: P1
  reliability:
    - id: "EARS.01.04.d400"
      statement: "THE retrieval component SHALL maintain availability for authorized calls"
      metric: "Successful authorized calls"
      target: ">= 99% (MVP)"
      priority: P1

