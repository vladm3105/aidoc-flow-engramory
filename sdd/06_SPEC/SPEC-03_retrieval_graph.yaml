id: SPEC-03
title: "Retrieval & Graph"

document_control:
  status: Draft
  version: "1.0"
  date_created: "2026-06-22T00:00:00"
  last_updated: "2026-06-22T00:00:00"
  author: "Engramory team"
  component: "RetrievalService"
  tdd_ready_score: "[Pending]/100"

component_overview:
  description: |
    Scoped retrieval of knowledge + distilled memory for an agent turn, combining vector
    similarity and optional graph traversal (behind GraphPort). Ranks results, attaches
    provenance/citations, and fails closed on store loss.
  architecture_decision: "@adr: ADR-03"
  diagram:
    tags: ["@diagram: c4-l3", "@diagram: dfd-l3"]
    mermaid: |
      flowchart LR
        AccessSurface --> RetrievalService
        RetrievalService --> VectorPort
        RetrievalService --> GraphPort
        RetrievalService --> MemoryStore
  language: "Python"
  dependencies:
    - { name: "GraphPort (SPEC-06)", version: "internal", purpose: "Relationship traversal" }

interfaces:
  exports:
    - name: "retrieve"
      type: "async function"
      signature: "async def retrieve(scope: Scope, query: str, k: int = 8, include_advisory: bool = False, token_budget: int | None = None) -> list[MemoryHit]"
      description: "Scoped hybrid retrieval (vector + optional graph), ranked, with provenance."
      errors: ["StoreUnavailable: fail closed", "AuthzError"]
    - name: "traverse"
      type: "async function"
      signature: "async def traverse(scope: Scope, entity: EntityId, hops: int) -> list[EntityId]"
      description: "Bounded relationship traversal via GraphPort."
      errors: ["StoreUnavailable"]
      note: "Graph traversal is optional for MVP: it rides on @bdd: BDD.01.03.a100 (no dedicated EARS/BDD trace) and earns its own bounded-traversal scenario once GraphPort has a real backend."

data_models:
  models:
    - name: "MemoryHit"
      type: "dataclass"
      fields:
        - { name: "memory_id", type: "MemoryId", required: true, description: "Result id" }
        - { name: "summary", type: "str", required: true, description: "Distilled text" }
        - { name: "score", type: "float", required: true, description: "Fused rank score" }
        - { name: "provenance", type: "dict", required: true, description: "Source trace" }
        - { name: "retrieval_id", type: "RetrievalId", required: true, description: "memory_retrievals row id (migration 0003) — pass to memory_feedback" }
        - { name: "token_count", type: "int", required: true, description: "summary token count, for budget accounting" }

behavior:
  validation_rules:
    - { rule: "Results restricted to caller scope; advisory-only memories excluded by default", source: "@ears: EARS.01.03.a100" }
  state_transitions:
    - { from: "Query", to: "Ranked results", trigger: "vector+graph fusion", source: "@bdd: BDD.01.03.a100" }
  error_handling:
    - { condition: "Canonical store unavailable", response: "Fail closed (no stale/unscoped data); retryable error within 500 ms", source: "@bdd: BDD.01.03.b800" }
    - { condition: "Out-of-scope target", response: "Deny, return no data, audit", source: "@bdd: BDD.01.03.e500" }

implementation_notes:
  constraints: ["Retrieval p95 within @threshold:PRD.01.perf.retrieval_p95", "Graph optional behind GraphPort"]
  patterns:
    - "Rank fusion: weighted Reciprocal Rank Fusion over three legs — vector cosine (w=0.5), lexical ts_rank over memories.ts_lex (w=0.3), recency (w=0.2); score = sum(w_leg / (60 + rank_leg)); graph signal, when GraphPort has a backend, joins as a fourth leg"
    - "Post-fusion multipliers: confidence (0..1) x scope proximity (agent 1.0, project 0.9, domain 0.8, space 0.7) x source_trust (human 1.0, tool 0.9, agent 0.8)"
    - "Default filter: status = 'active' AND valid_to IS NULL (partial index idx_memories_tenant_live, migration 0003); include_advisory=true adds status='advisory', never quarantined/superseded"
    - "Every returned hit writes a memory_retrievals row and carries its retrieval_id; token_budget (default @threshold:PRD.01.perf.context_token_budget) truncates by cumulative summary tokens"
  performance_considerations: ["Cap graph hops; cache hot scopes"]

tdd_contracts:
  tdd_document: "@tdd: TDD-03"
  test_files:
    - { path: "tests/unit/test_ranking.py", covers: "fusion + advisory exclusion" }
    - { path: "tests/e2e/test_retrieval_latency.py", covers: "BDD.01.03.a100 p95" }

traceability:
  tags: ["@spec: SPEC-03"]
  upstream:
    adr_references: ["@adr: ADR.03.03.a100"]
    bdd_references: ["@bdd: BDD.01.03.a100", "@bdd: BDD.01.03.b800", "@bdd: BDD.01.03.e500"]
    ears_references: ["@ears: EARS.01.03.a100", "@ears: EARS.01.03.c900", "@ears: EARS.01.03.f600"]
  downstream:
    - { type: TDD, layer: 7, description: "Retrieval/graph tests" }
    - { type: IPLAN, layer: 8, description: "Retrieval service implementation" }
  health_score: { tdd_ready: "[Pending]%", target_score: ">=90/100" }
