test_pyramid: { distribution: { unit: 65, integration: 30, e2e: 5 } }

test_mapping:
  scenarios:
    - bdd_scenario: "@bdd: BDD.01.03.d400"
      description: "Consolidation runs at cadence; observable run record"
      tests: [{ type: integration, file: "tests/integration/test_reflection.py", function: "test_consolidation_cadence", status: pending }]
    - bdd_scenario: "@bdd: BDD.01.03.a700"
      description: "Low-confidence lesson quarantined"
      tests: [{ type: unit, file: "tests/unit/test_consolidation.py", function: "test_quarantine_low_confidence", status: pending }]
  coverage_table:
    columns: [BDD Scenario, Unit, Integration, E2E, Total]
    rows: [["BDD.01.03.d400", 0, 1, 0, 1], ["BDD.01.03.a700", 1, 0, 0, 1]]

test_cases:
  unit_tests:
    cases:
      - id: "TDD.04.04.a100"
        name: "low-confidence lesson marked advisory-only, provenance retained"
        spec_ref: "@spec: SPEC-04"
        target: "consolidate"
        test_file: "tests/unit/test_consolidation.py"
        test_function: "test_quarantine_low_confidence"
        inputs: [{ name: "lesson", type: "Memory", value: "confidence below floor" }]
        expected_output: { type: "ConsolidationStats", value: "quarantined>=1; provenance retained" }
        edge_cases: [{ condition: "duplicate lessons", expected: "merged, count in stats" }]
  integration_tests:
    cases:
      - id: "TDD.04.04.b100"
        name: "consolidation fires every cadence threshold; emits run record"
        spec_ref: "@spec: SPEC-04"
        contract: "consolidate cadence + observability"
        test_file: "tests/integration/test_reflection.py"
        test_function: "test_consolidation_cadence"
        setup: ["seed 20 new memories", "mock LLMPort"]
        action: { description: "run worker" }
        expected_state: ["ConsolidationStats.run_id present", "observable consolidation_run emitted"]
        error_paths: [{ condition: "LLM gateway down", expected_error: "LLMUnavailable (retryable, idempotent)" }]
  e2e_tests: { cases: [] }

thresholds:
  unit: { coverage_target: ">=90%", pass_criteria: ["All pass"], fail_action: "Block merge" }
  integration: { coverage_target: ">=85%", pass_criteria: ["Cadence + idempotency verified"], fail_action: "Block merge" }
  e2e: { coverage_target: "N/A", timeout_budget: "<=300s", pass_criteria: ["N/A"], fail_action: "N/A" }

tdd_order:
  phases:
    - { phase: 1, name: "Write Tests", action: "Tests first", output: "Test files" }
    - { phase: 2, name: "Red", action: "Confirm fail", output: "Failure report" }
    - { phase: 3, name: "Implement", action: "Make pass", output: "Implementation" }
    - { phase: 4, name: "Green", action: "All pass", output: "Pass report" }
    - { phase: 5, name: "Refactor", action: "Stay green", output: "Refactored code" }

