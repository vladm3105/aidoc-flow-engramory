# =============================================================================
# Section 1: Document Control
# =============================================================================
document_control:
  product_name: "Engramory (aidoc-flow-engramory)"
  version: "1.0"
  status: Draft
  date_created: "2026-06-22T00:00:00"
  last_updated: "2026-06-22T00:00:00"
  author: "Engramory team"
  reviewer: "[Technical Lead]"
  approver: "[Stakeholder]"
  brd_reference: "@brd: BRD-01"
  priority: High
  target_release: "TBD"
  ears_ready_score: "[Pending]/100"
  revision_history:
    - version: "1.0"
      date: "2026-06-22T00:00:00"
      author: "Engramory team"
      changes: "Initial MVP draft — product/container definition."

# =============================================================================
# Section 2: Executive Summary
# =============================================================================
executive_summary:
  overview: |
    Engramory is the shared memory & knowledge product for the aidoc-flow
    ecosystem. It packages a knowledge service, a layered memory service, a
    distillation engine, and a single agent-access surface into one product
    that any agent consumes, and that replaces ucx_kb. This PRD defines the
    product containers, behaviors, and acceptance for the MVP.
  mvp_hypothesis:
    statement: "We believe that the ecosystem's AI agents will reuse knowledge and accumulated experience across projects if we give them one shared memory product with a distillation loop."
    validation: "We will know this is true when >=4 agent types operate against the access surface, >=2 projects share the memory plane, and a distilled lesson demonstrably changes an outcome."
  timeline:
    - phase: Development
      dates: "TBD"
      duration: "MVP cycle"
    - phase: Testing
      dates: "TBD"
      duration: "[X] weeks"
    - phase: "MVP Launch"
      dates: "TBD"
    - phase: "Validation Period"
      dates: "+30 days post-launch"
      duration: "30 days"

# =============================================================================
# Section 3: Problem Statement
# =============================================================================
problem_statement:
  current_state:
    - "Knowledge is fragmented across RAC, the Nexus design, and ucx_kb: agents can't share it."
    - "No per-agent experiential memory: agents repeat mistakes and lose context across projects."
    - "ucx_kb is KB-only: no distilled cross-project memory; lock-in risk to single stacks."
  business_impact:
    revenue: "N/A (internal platform) — measured via delivery speed and reuse"
    customer_satisfaction: "Agent/operator effectiveness; fewer repeated errors"
    competitive: "A shared, portable brain differentiates the ecosystem's agent operations"
  opportunity: |
    Consolidate three knowledge efforts into one portable memory plane and add the
    per-agent distilled memory none of them has — replacing ucx_kb in the process.

# =============================================================================
# Section 4: Target Audience & User Personas
# =============================================================================
target_audience:
  primary_persona:
    name: "Operating Agent"
    role: "An AI agent (Claude Code, Codex, Hermes, or custom) doing project work"
    key_characteristic: "Runs many tasks across many projects; needs the right prior knowledge at the right moment"
    main_pain_point: "Loses context between sessions/projects and repeats solved problems"
    success_criteria: "Retrieves relevant knowledge + distilled lessons scoped to its task; records new experience cheaply"
    usage_frequency: "Continuous (every task/turn)"
  secondary_personas:
    - name: "Framework / Hermes lifecycle"
      role: "Authors and governs SDD artifacts; needs KB representation (replacing ucx_kb)"
    - name: "Consumer project"
      role: "aidoc-flow / AI Operations Intelligence / BeeLocal — builds on the shared brain"
    - name: "Human reviewer / operator"
      role: "Audits provenance; approves governed writes"

# =============================================================================
# Section 5: Success Metrics & KPIs
# =============================================================================
success_metrics:
  mvp_validation_30day:
    - id: "PRD.01.05.a100"
      metric: "Agent-type adoption of the access surface"
      baseline: "0"
      target: ">=4 agent types"
      measurement: "Distinct agent runtimes issuing read/write calls"
    - id: "PRD.01.05.b200"
      metric: "Projects sharing the memory plane"
      baseline: "0"
      target: ">=2 projects"
      measurement: "Distinct project scopes with reads/writes"
  business_90day:
    - metric: "Distilled-lesson-changed-outcome cases"
      target: ">=1 demonstrable case"
      decision_threshold: "< 1 = revisit distillation engine"
  post_launch_validation:
    day_7:
      - metric: "Access-surface availability for agents"
        target: ">=99% successful authorized calls"
    day_30:
      - metric: "Cross-project recall error rate"
        target: "<0.5% wrong-scope returns"
  decision_gate:
    proceed: "All targets met → proceed to BRD-02 cloud migration"
    iterate: "60-80% met → refine distillation/retrieval"
    pivot: "<60% met → reconsider shared-memory hypothesis"

# =============================================================================
# Section 6: Goals & Objectives
# =============================================================================
goals_and_objectives:
  primary:
    - id: "PRD.01.06.a100"
      goal: "Ship one shared memory+knowledge product consumed by all agent types"
      metric: "Agent-type adoption"
      target: ">=4"
      timeline: "MVP Launch"
    - id: "PRD.01.06.b200"
      goal: "Replace ucx_kb with parity"
      metric: "ucx_kb coverage rules satisfied"
      target: "100%"
      timeline: "MVP Launch"
  secondary:
    - id: "PRD.01.06.c300"
      objective: "Demonstrate distilled per-agent memory across projects"
      priority: P2
      success_criteria: "Lessons retrievable across >=2 projects"
  stretch_goals:
    - goal: "Pilot a managed memory accelerator without moving canonical store"
      condition: "If MVP metrics exceed targets"
      benefit: "De-risks BRD-02 cloud migration"

# =============================================================================
# Section 7: Scope & Requirements
# =============================================================================
scope_and_requirements:
  in_scope:
    features:
      - id: 1
        name: "Knowledge Service (L0)"
        priority: P1-Must
        description: "Ingest and retrieve documents with section-level results and citations."
      - id: 2
        name: "Memory Service (L1 short-term)"
        priority: P1-Must
        description: "Project-scoped working memory, archived/distilled at project end."
      - id: 3
        name: "Memory Service (L2 long-term)"
        priority: P1-Must
        description: "Distilled semantic/episodic/procedural memory across projects."
      - id: 4
        name: "Per-Agent Identity & Scoping (L3)"
        priority: P1-Must
        description: "Per-agent memory namespaces plus a shared team namespace; scope by agent/project/tenant."
      - id: 5
        name: "Distillation Engine"
        priority: P1-Must
        description: "Reflection (episode→lesson) and consolidation (compact/merge/expire)."
      - id: 6
        name: "Agent Access Surface"
        priority: P1-Must
        description: "One shared standard interface for all agents to read/write knowledge + memory."
      - id: 7
        name: "Framework KB Compatibility (ucx_kb replacement)"
        priority: P1-Must
        description: "SDD-artifact KB entries, coverage rules, traceability graph, governed ingestion/maintenance, Hermes skill parity."
      - id: 8
        name: "Canonical Store & Portability"
        priority: P1-Must
        description: "Own the canonical store; migrate self-host→cloud via dump + adapter swap."
      - id: 9
        name: "Governed-Write Authority"
        priority: P2-Should
        description: "SDD-artifact memory writes only on approved evidence; gates are source of truth."
      - id: 10
        name: "Provenance & Audit"
        priority: P2-Should
        description: "Provenance on every memory; on-demand human-readable audit view."
  dependencies:
    technical: "Agent runtimes must speak the shared interface (MCP); a model gateway provides embeddings/generation; a relational+vector store and a graph capability back the services."
    business: "Framework owner sign-off on ucx_kb replacement parity; consumer projects available for pilot."
    external: "Local model runtime for dev; managed cloud equivalents for later migration."
  out_of_scope:
    - "Cloud-managed deployment automation — deferred to BRD-02."
    - "Advanced ML distillation/scoring — deferred to BRD-03."
    - "Consumer domain configs — deferred to BRD-04."

# =============================================================================
# Section 7b: Component Decomposition (named thresholds for downstream NFR cites)
# =============================================================================
component_decomposition:
  _required: true
  components:
    - id: "memory-retrieval"
      responsibility: "Scoped retrieval of knowledge + distilled memory for an agent turn."
      thresholds:
        - key: "retrieval_p95"
          full_id: "PRD.01.perf.retrieval_p95"
          value: 800
          unit: "ms"
          source: "@brd: BRD-01"
    - id: "distillation-engine"
      responsibility: "Reflection and consolidation passes over episodes/long-term memory."
      thresholds:
        - key: "consolidation_cadence"
          full_id: "PRD.01.rate.consolidation_cadence"
          value: 20
          unit: "new_memories"
          source: "@brd: BRD-01"
    - id: "access-surface"
      responsibility: "Authorized, scoped read/write interface for all agents."
      thresholds:
        - key: "authz_scope_error"
          full_id: "PRD.01.risk.authz_scope_error"
          value: 0.5
          unit: "percent"
          source: "@brd: BRD-01"

# =============================================================================
# Section 8: User Stories & User Roles
# =============================================================================
user_stories:
  roles:
    - role: "Operating Agent"
      description: "AI agent performing project work."
    - role: "Framework / Hermes"
      description: "Authors/governs SDD artifacts; consumes KB."
    - role: "Human reviewer"
      description: "Audits provenance; approves governed writes."
  stories:
    - id: "PRD.01.08.a100"
      role: "Operating Agent"
      want: "to retrieve the knowledge and lessons relevant to my current task, scoped to me and my project"
      so_that: "I act with the right context and don't repeat past mistakes"
      priority: P1
      acceptance_criteria:
        - "Returns scoped knowledge + distilled lessons with citations; no cross-tenant leakage"
    - id: "PRD.01.08.b200"
      role: "Operating Agent"
      want: "to record what I decided, what failed, and the outcome"
      so_that: "my experience becomes reusable later"
      priority: P1
      acceptance_criteria:
        - "Episodes are accepted and later distilled into long-term memory"
    - id: "PRD.01.08.c300"
      role: "Framework / Hermes"
      want: "KB representation of SDD artifacts with governed updates"
      so_that: "the framework can retire ucx_kb without losing capability"
      priority: P1
      acceptance_criteria:
        - "ucx_kb coverage rules satisfied; Hermes KB skills operate unchanged"
    - id: "PRD.01.08.d400"
      role: "Human reviewer"
      want: "to see where a memory came from and approve governed writes"
      so_that: "bad or unauthorized memory can be traced and prevented"
      priority: P2
      acceptance_criteria:
        - "Every memory shows provenance; SDD-artifact writes require an approval reference"

# =============================================================================
# Section 9: Functional Requirements
# =============================================================================
functional_requirements:
  core_capabilities:
    - id: "PRD.01.09.a100"
      name: "Scoped knowledge + memory retrieval"
      description: |
        The product returns, for an agent turn, the most relevant knowledge-base
        sections and distilled memories within the caller's agent/project/tenant
        scope, with citations/provenance.
      priority: P1
      acceptance_criteria:
        - id: "PRD.01.09.a101"
          criterion: "Retrieval latency"
          target: "p95 within @threshold: PRD.01.perf.retrieval_p95"
        - id: "PRD.01.09.a102"
          criterion: "Scope correctness"
          target: "wrong-scope returns < @threshold: PRD.01.risk.authz_scope_error"
      brd_reference: "@brd: BRD.01.07.1a01"
    - id: "PRD.01.09.b200"
      name: "Experience capture and distillation"
      description: |
        The product accepts episodes (decisions, errors, outcomes), runs a
        reflection pass into long-term memory, and periodically consolidates.
      priority: P1
      acceptance_criteria:
        - id: "PRD.01.09.b201"
          criterion: "Consolidation cadence"
          target: "consolidation runs every @threshold: PRD.01.rate.consolidation_cadence"
        - id: "PRD.01.09.b202"
          criterion: "Reuse demonstrated"
          target: ">=1 distilled-lesson-changed-outcome case"
      brd_reference: "@brd: BRD.01.07.5e01"
    - id: "PRD.01.09.c300"
      name: "Shared agent access"
      description: |
        All agent types read/write knowledge and memory through one shared
        standard interface, authorized and scoped per caller.
      priority: P1
      acceptance_criteria:
        - id: "PRD.01.09.c301"
          criterion: "Cross-agent interoperability"
          target: ">=4 agent types operate against the surface"
      brd_reference: "@brd: BRD.01.07.6f01"
    - id: "PRD.01.09.d400"
      name: "ucx_kb replacement"
      description: |
        The product represents SDD artifacts as KB entries, enforces coverage
        rules and cumulative-tag traceability, and provides Hermes-compatible
        retrieval-enrichment and governed-maintenance behavior.
      priority: P1
      acceptance_criteria:
        - id: "PRD.01.09.d401"
          criterion: "Drop-in parity"
          target: "100% ucx_kb coverage rules; Hermes KB skills unchanged"
      brd_reference: "@brd: BRD.01.07.7a01"
    - id: "PRD.01.09.e500"
      name: "Portable canonical store"
      description: |
        The product keeps a single canonical store and supports migration from
        self-host to a managed cloud store via dump + adapter swap, regenerating
        derived projections (embeddings, graph).
      priority: P1
      acceptance_criteria:
        - id: "PRD.01.09.e501"
          criterion: "Migration path"
          target: "Demonstrated dump+restore+adapter-swap to a managed cloud store"
      brd_reference: "@brd: BRD.01.07.8b01"
    - id: "PRD.01.09.f600"
      name: "Cross-project distilled recall (L2)"
      description: |
        The product retains distilled semantic, episodic, and procedural memory
        and surfaces relevant lessons distilled in one project when the same
        agent works in another project, within the agent's scope.
      priority: P1
      acceptance_criteria:
        - id: "PRD.01.09.f601"
          criterion: "Cross-project recall"
          target: "Lessons distilled in project A are retrievable by the same agent scope in project B across >=2 projects"
      brd_reference: "@brd: BRD.01.07.3c01"
    - id: "PRD.01.09.a700"
      name: "Per-agent memory identity & shared team namespace (L3)"
      description: |
        The product gives each agent its own accumulating memory namespace plus
        access to a shared team (space-scoped) namespace, so agents diverge in
        private memory while sharing team memory where appropriate.
      priority: P1
      acceptance_criteria:
        - id: "PRD.01.09.a701"
          criterion: "Per-agent divergence + shared namespace"
          target: "Two agents accrue distinct per-agent memories while sharing a team (space) namespace"
      brd_reference: "@brd: BRD.01.07.4d01"
  user_journey:
    diagram:
      type: sequenceDiagram
      content: |
        participant Agent
        participant Engramory
        participant Memory Service
        Agent->>Engramory: Request scoped context for a task
        Engramory->>Memory Service: Retrieve knowledge + lessons (scoped)
        alt Authorized + found
            Memory Service-->>Engramory: Ranked results + provenance
            Engramory->>Agent: Context for the task
        else Out of scope / unauthorized
            Engramory->>Agent: Denied at scope boundary (no data)
        end
        Agent->>Engramory: Record episode (decision/error/outcome)
        Engramory->>Memory Service: Append; distill later into long-term memory
  diagram_contract:
    _note: "Container level (C4-L2); sequence includes alt/else for the unauthorized/out-of-scope path."

# =============================================================================
# Section 10: Customer-Facing Content & Messaging  (agent/operator-facing)
# =============================================================================
customer_facing_content:
  _note: "Engramory is infrastructure; 'customer-facing' content is agent- and operator-facing."
  positioning: |
    Engramory is the shared brain for your AI agents — one memory and knowledge
    plane, portable and per-agent, that replaces ucx_kb.
  key_messages:
    - "One brain, many projects: agents keep what they learn."
    - "Own your memory: portable canonical store, no lock-in."
    - "Drop-in for the framework: replaces ucx_kb with parity."
  error_messages:
    - trigger: "Agent requests memory outside its scope"
      message: "Access denied: requested memory is outside your agent/project/tenant scope."
      guidance: "Narrow the request to your scope, or request a shared-namespace entry."
    - trigger: "SDD-artifact write without approval reference"
      message: "Write rejected: SDD-artifact memory requires an approved evidence reference."
      guidance: "Attach the approved IPLAN/evidence reference and retry."
  success_messages:
    - trigger: "Episode recorded"
      message: "Experience recorded; it will be distilled into long-term memory."
      channel: "In-API"
    - trigger: "Distillation run complete"
      message: "Consolidation complete; long-term memory updated and compacted."
      channel: "In-API / operator log"
  documentation_requirements:
    - "Agent integration guide for the access surface."
    - "Operator guide for the distillation/consolidation worker and provenance/audit export."
    - "Migration guide: ucx_kb → Engramory, and self-host → cloud."

# =============================================================================
# Section 11: Acceptance Criteria
# =============================================================================
acceptance_criteria:
  launch_gates:
    items:
      - category: Functional
        criterion: "All P1 features complete"
        threshold: "100%"
        validation: "UAT signoff"
      - category: Compatibility
        criterion: "ucx_kb coverage rules satisfied; Hermes skills unchanged"
        threshold: "100%"
        validation: "Parity conformance suite"
      - category: Quality
        criterion: "Critical bugs resolved"
        threshold: "0 open"
        validation: "QA signoff"
      - category: Performance
        criterion: "Retrieval meets p95 threshold"
        threshold: ">=90% of turns within PRD.01.perf.retrieval_p95"
        validation: "Load test"
      - category: Security
        criterion: "Scope isolation enforced; no cross-tenant leakage"
        threshold: "0 leakage in tests"
        validation: "Security review (addresses BRD abuse cases)"
  business_acceptance:
    - ">=4 agent types operate against the access surface"
    - ">=2 projects share the memory plane"
  technical_acceptance:
    - "Distillation loop runs end-to-end (episode → lesson → reuse)"
    - "Self-host → managed cloud store migration demonstrated"

# =============================================================================
# Section 12: Constraints & Assumptions
# =============================================================================
constraints_and_assumptions:
  constraints:
    - id: "PRD.01.12.a100"
      category: Technical
      description: "All infrastructure reached through ports/adapters; no managed-only hard dependency."
      impact: "Preserves portability across self-host/GCP/Azure."
    - id: "PRD.01.12.b200"
      category: Business
      description: "ucx_kb parity is a hard launch gate."
      impact: "Framework cannot retire ucx_kb until parity proven."
  assumptions:
    - id: "PRD.01.12.c300"
      assumption: "Agents speak the shared interface (MCP)."
      validation_method: "Confirm MCP support across agent runtimes."
      impact_if_false: "Thin adapters for non-MCP agents."
    - id: "PRD.01.12.d400"
      assumption: "An off-the-shelf engine can drive distillation over our canonical store."
      validation_method: "Pilot a memory engine over the store."
      impact_if_false: "Build consolidation natively."

# =============================================================================
# Section 13: Risk Assessment
# =============================================================================
risk_assessment:
  risks:
    - id: "PRD.01.13.a100"
      description: "Distillation produces noise, not signal."
      likelihood: Medium
      impact: High
      mitigation: "Adopt proven consolidation engine; keep provenance to trace/retire bad lessons."
      owner: "Technical Lead"
    - id: "PRD.01.13.b200"
      description: "Scope isolation defect leaks one tenant's memory to another."
      likelihood: Low
      impact: High
      mitigation: "Mandatory scope checks; leakage tests in the security gate."
      owner: "Security Engineer"
    - id: "PRD.01.13.c300"
      description: "ucx_kb parity gap blocks framework cutover."
      likelihood: Medium
      impact: High
      mitigation: "Treat coverage rules as a conformance suite; parity gate before cutover."
      owner: "Framework owner"

# =============================================================================
# Section 14: Traceability
# =============================================================================
traceability:
  tags:
    - "@prd: PRD-01"
  upstream:
    brd_references:
      - "@brd: BRD.01.07.1a01"
      - "@brd: BRD.01.07.2b01"
      - "@brd: BRD.01.07.3c01"
      - "@brd: BRD.01.07.4d01"
      - "@brd: BRD.01.07.5e01"
      - "@brd: BRD.01.07.6f01"
      - "@brd: BRD.01.07.7a01"
      - "@brd: BRD.01.07.8b01"
      - "@brd: BRD.01.07.9c01"
      - "@brd: BRD.01.07.0d01"
  downstream_expected:
    - type: EARS
      layer: 3
      description: "Formal WHEN-THE-SHALL-WITHIN requirements derived from these capabilities."
  adr_topic_elaboration:
    _note: "PRD specifies HOW to evaluate each BRD Section 8 topic; ADR records WHICH option."
    topics:
      - topic: "Data architecture (canonical store + vectors + graph)"
        brd_reference: "@brd: BRD.01.08.b200"
        status: Selected
        adr_reference: ["@adr: ADR-01", "@adr: ADR-03"]
        business_driver: "One portable canonical store; relationship queries for traceability/recall."
        options: "Relational+vector store as canonical (e.g., PostgreSQL + pgvector); graph via in-store extension vs dedicated engine (pure-Postgres recursive CTE vs Neo4j vs Apache AGE) — evaluate on multi-cloud managed availability and graph capability."
        decision: "PostgreSQL + pgvector canonical spine (ADR-01); Neo4j graph engine behind a port (ADR-03)."
      - topic: "Models, embeddings & distillation"
        brd_reference: "@brd: BRD.01.08.f600"
        status: Selected
        adr_reference: ["@adr: ADR-04"]
        business_driver: "Embeddings + generation with provider portability; distillation engine."
        options: "Single model gateway (e.g., LiteLLM) routing local models in dev to managed cloud models later; memory/distillation engine behind a port (e.g., LangMem vs Cipher vs Mem0)."
        decision: "LiteLLM as the single model gateway (ADR-04)."
      - topic: "Integration & framework compatibility"
        brd_reference: "@brd: BRD.01.08.c300"
        status: Selected
        adr_reference: []
        business_driver: "Agents and the framework consume over MCP; ucx_kb replaced."
        options: "MCP access surface; Hermes KB skill compatibility layer; ucx_kb migration (entries + graph re-projection)."
        decision: "Selection recorded at BRD §8 (BRD.01.08.c300, Selected): MCP access surface + Hermes KB skill compatibility + ucx_kb migration; no dedicated ADR (elaborated in SPEC-01/SPEC-05)."
      - topic: "Hosting/deployment & technology boundaries"
        brd_reference: "@brd: BRD.01.08.a100"
        status: Selected
        adr_reference: ["@adr: ADR-02", "@adr: ADR-05"]
        business_driver: "Self-host dev, migratable to GCP/Azure."
        options: "Ports & adapters with per-environment adapter sets; container topology for dev; managed equivalents for cloud."
        decision: "Ports & adapters / hexagonal boundaries (ADR-02); canonical data in Postgres with rebuildable projections (ADR-05)."
      - topic: "Security (authentication & data protection)"
        brd_reference: "@brd: BRD.01.08.d400"
        status: Partially Selected
        adr_reference: ["@adr: ADR-06"]
        business_driver: "Multi-tenant isolation, governed writes, per-tenant residency, secret handling."
        options: "Governed-write authority + fail-closed access; identity via OIDC; secrets via a SecretsPort adapter."
        decision: "Governed-write authority and fail-closed access are Selected (ADR-06). OIDC identity and secrets-adapter selection remain Pending (note: deferred; secrets are excluded from stored memory by policy)."
  cross_links:
    depends:
      - "@depends: BRD-01"
    discoverability:
      - "@discoverability: PRD-01 (sole product definition this cycle)"
  health_score:
    brd_coverage: "[Pending]%"
    target_score: ">=90/100"

# =============================================================================
# Section 15: Glossary
# =============================================================================
glossary:
  terms:
    - term: PRD
      definition: "Product Requirements Document"
    - term: Access Surface
      definition: "The single shared interface agents use to read/write knowledge and memory."
    - term: Distillation Engine
      definition: "Component running reflection + consolidation over episodes and long-term memory."
    - term: Canonical store
      definition: "The product's single source of truth; embeddings/graph are rebuildable projections."
    - term: ucx_kb
      definition: "Framework knowledge-base package Engramory replaces."

# =============================================================================
# End of PRD-01
# =============================================================================
